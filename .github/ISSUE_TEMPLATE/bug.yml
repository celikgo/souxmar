name: Bug report
description: Something is broken — souxmar misbehaves, crashes, or produces wrong results.
title: "[bug]: "
labels: ["type:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail that a maintainer can reproduce.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce. Include commands, pipeline files, geometry sources where possible.
      placeholder: |
        1. `souxmar run my-pipeline.yaml`
        2. The mesher returns SOUXMAR_E_PLUGIN_FAULT
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you thought would happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What did happen. Include error messages, stack traces, screenshots.
    validations:
      required: true

  - type: input
    id: souxmar-version
    attributes:
      label: souxmar version
      description: Output of `souxmar --version` (or commit hash if a build).
      placeholder: "0.1.0 / git: a93f..."
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface affected
      multiple: true
      options:
        - Desktop app
        - CLI
        - Python (pysouxmar)
        - Plugin SDK
        - AI agent / chat
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      multiple: true
      options:
        - macOS (arm64)
        - macOS (x86_64)
        - Linux x86_64
        - Linux arm64
        - Windows x86_64
        - Windows arm64
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / audit trail
      description: |
        Relevant lines from `~/.local/share/souxmar/logs/` (Linux) /
        `~/Library/Logs/souxmar/` (macOS) / `%APPDATA%\souxmar\logs\` (Windows),
        or from `.souxmar/chat/audit.log` if AI-related.
      render: text
