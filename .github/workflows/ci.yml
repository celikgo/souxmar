name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  CMAKE_GENERATOR: Ninja

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-22.04
            preset: ci-linux-gcc
          - name: linux-clang
            os: ubuntu-22.04
            preset: ci-linux-clang
          - name: macos-arm64
            os: macos-14
            preset: ci-macos
          - name: windows-msvc
            os: windows-2022
            preset: ci-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # autoconf/autoconf-archive/automake/libtool are required by
          # vcpkg's libsodium port (2026.04.27 baseline builds from
          # source via autotools — the pre-built archive the 2020
          # baseline shipped no longer exists upstream).
          sudo apt-get install -y ninja-build pkg-config curl zip unzip tar \
                                  autoconf autoconf-archive automake libtool
          if [ "${{ matrix.preset }}" = "ci-linux-clang" ]; then
            wget -q https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 17
            sudo apt-get install -y clang-17 clang-tools-17 clang-tidy-17
          fi

      - name: Install macOS toolchain
        if: runner.os == 'macOS'
        # autoconf-archive + libtool required by vcpkg's libsodium port
        # (see Linux step). autoconf + automake ship with Xcode CLT but
        # libtoolize is provided by Homebrew's `libtool`.
        run: brew install ninja pkg-config autoconf autoconf-archive automake libtool

      - name: Install Windows toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 56bb2411609227288b70117ead2c47585ba07713
          runVcpkgInstall: false

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.name }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --no-tests=error

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.name }}
          path: |
            build/**/Testing/Temporary/LastTest.log
            build/**/Testing/Temporary/LastTestsFailed.log

  format-check:
    name: clang-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-17
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y clang-format-17

      - name: Verify formatting
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in src/**/*.cpp src/**/*.h include/**/*.h tests/**/*.cpp tests/**/*.h; do
            if ! clang-format-17 --dry-run --Werror "$f"; then
              fail=1
            fi
          done
          exit $fail

  no-secrets:
    name: secret-scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secret-shaped strings
        run: |
          # Conservative regex set; expand over time. Excludes the docs that DOCUMENT
          # the patterns themselves (e.g. ENGINEERING_PRACTICES.md, AI_INTEGRATION.md).
          patterns='(sk-[A-Za-z0-9_-]{20,}|xoxb-[0-9]{10,}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36})'
          ! git grep -nE "$patterns" -- ':!docs/' ':!.claude/skills/' ':!.github/workflows/'

  # Sprint 7 push 1 — ABI v1 lockdown gate. Per ADR-0008 every header
  # under include/souxmar-c/ is pinned for the entire 1.x release
  # series. Edits land via the ratchet (additive minor surface / bug
  # fix) markers or a Tier-3 ADR; everything else is rejected here.
  abi-v1-lockdown:
    name: abi-v1-lockdown
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check frozen-header diff against ratchet rules
        run: |
          scripts/check-frozen-headers.sh \
            "origin/${{ github.base_ref }}" \
            "${{ github.event.pull_request.head.sha }}"

  # Sprint 9 push 1 — tool-contract v1 lockdown gate. Per ADR-0011 (which
  # supersedes the freeze-candidate ADR-0010) the agent tool contract is
  # frozen final at v1: 18 tools + the framework surface in
  # include/souxmar/ai/tool.h. Edits land via the ratchet (additive tool
  # / additive context field) markers or a Tier-3 ADR; everything else
  # is rejected here. Mirrors the abi-v1-lockdown job above.
  tool-contract-v1-lockdown:
    name: tool-contract-v1-lockdown
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tool-contract diff against ratchet rules
        run: |
          scripts/check-tool-contract.sh \
            "origin/${{ github.base_ref }}" \
            "${{ github.event.pull_request.head.sha }}"
