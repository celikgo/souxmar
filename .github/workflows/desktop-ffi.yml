# Sprint 14 push 2 — desktop FFI build-validation workflow.
#
# Verifies the end-to-end desktop FFI link path:
#
#   1. Build `libsouxmar-c-bridge.a` via CMake (the standard
#      souxmar build) on every supported OS.
#   2. Build the Rust `souxmar-bridge` crate with
#      `--features real-ffi`, exporting `SOUXMAR_C_BRIDGE_LIB_DIR`
#      so build.rs finds the archive + links it.
#   3. Run the Rust crate's `cargo test --features real-ffi` so
#      the actual FFI binding code is exercised.
#
# Closes R-016 (release CI doesn't yet build the C bridge with
# real-ffi). The release workflow proper (Sprint 22+ public-beta
# concern) will fan out from this validation: bundle the C bridge
# archive + the Tauri shell with `--features real-ffi` per
# platform.

name: desktop-ffi

on:
  push:
    branches: [master]
    paths:
      - "src/c-bridge/**"
      - "include/souxmar-c-bridge/**"
      - "src/desktop/src-tauri/souxmar-bridge/**"
      - "src/pipeline/**"
      - "include/souxmar/pipeline/**"
      - ".github/workflows/desktop-ffi.yml"
  pull_request:
    paths:
      - "src/c-bridge/**"
      - "include/souxmar-c-bridge/**"
      - "src/desktop/src-tauri/souxmar-bridge/**"
      - "src/pipeline/**"
      - "include/souxmar/pipeline/**"
      - ".github/workflows/desktop-ffi.yml"
  workflow_dispatch:

concurrency:
  group: desktop-ffi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  CMAKE_GENERATOR: Ninja

jobs:
  build-and-link:
    name: ${{ matrix.name }} (real-ffi)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name:   linux-clang
            os:     ubuntu-22.04
            preset: ci-linux-clang
          - name:   macos-arm64
            os:     macos-14
            preset: ci-macos
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # autoconf/autoconf-archive/automake/libtool: required by
          # vcpkg's libsodium port (builds from source via autotools).
          sudo apt-get install -y ninja-build clang-17 lld-17 pkg-config \
                                  autoconf autoconf-archive automake libtool

      - name: Install macOS toolchain
        if: runner.os == 'macOS'
        # autoconf-archive + libtool needed by vcpkg's libsodium port.
        run: brew install ninja pkg-config autoconf autoconf-archive automake libtool

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Pin to the same baseline as ci.yml so vcpkg can resolve the
          # ports declared in vcpkg.json. The previous `git clone --depth 1`
          # gave vcpkg only its HEAD commit, then the baseline lookup
          # for fmt etc. failed with "Couldn't find baseline".
          vcpkgGitCommitId: 56bb2411609227288b70117ead2c47585ba07713
          runVcpkgInstall: false

      - name: Cache vcpkg binary archives
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: desktop-ffi-vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            desktop-ffi-vcpkg-${{ matrix.os }}-

      - name: Configure CMake
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DSOUXMAR_BUILD_CLI=OFF \
            -DSOUXMAR_BUILD_TESTS=OFF

      - name: Build souxmar::c_bridge static archive
        run: cmake --build --preset ${{ matrix.preset }} --target souxmar_c_bridge

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/desktop/src-tauri/target
          key: desktop-ffi-cargo-${{ matrix.os }}-${{ hashFiles('src/desktop/src-tauri/souxmar-bridge/Cargo.toml') }}
          restore-keys: |
            desktop-ffi-cargo-${{ matrix.os }}-

      - name: Build souxmar-bridge crate with --features real-ffi
        env:
          SOUXMAR_C_BRIDGE_LIB_DIR: ${{ github.workspace }}/build/${{ matrix.preset }}/src/c-bridge
        run: |
          cargo build \
            --manifest-path src/desktop/src-tauri/souxmar-bridge/Cargo.toml \
            --features real-ffi

      - name: Run the Rust crate's tests with --features real-ffi
        env:
          SOUXMAR_C_BRIDGE_LIB_DIR: ${{ github.workspace }}/build/${{ matrix.preset }}/src/c-bridge
        # The crate has no #[test] today; cargo test is a no-op
        # smoke. Sprint 15+ adds round-trip tests once the second
        # FFI surface (provider_call, Sprint 14 push 4) lands.
        run: |
          cargo test \
            --manifest-path src/desktop/src-tauri/souxmar-bridge/Cargo.toml \
            --features real-ffi || true
