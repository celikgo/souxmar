# Sprint 7 push 4 — agent eval suite nightly.
#
# Runs souxmar-eval against evals/v1/ on a nightly schedule and on
# every PR that touches the eval surface (the runner, the catalogue,
# any v1 agent tool). The job fails — and so blocks the merge — when
# any task fails.
#
# Sprint 8+ extends this to a per-PR gate on a percentage pass bar
# (start: 95% of v1 must pass on every PR; 100% nightly). For now
# we run nightly + on the directly-affected paths.

name: eval-nightly

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  pull_request:
    paths:
      - 'tools/eval/**'
      - 'evals/v1/**'
      - 'src/ai/**'
      - 'include/souxmar/ai/**'
      - 'scripts/synth-load/**'
      - 'examples/**'
      - '.github/workflows/eval-nightly.yml'
  workflow_dispatch:

concurrency:
  group: eval-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  CMAKE_GENERATOR: Ninja

jobs:
  eval:
    name: agent eval suite v1
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update
          # autoconf/autoconf-archive/automake/libtool: required by
          # vcpkg's libsodium port (builds from source via autotools).
          sudo apt-get install -y ninja-build clang-17 lld-17 \
                                  autoconf autoconf-archive automake libtool

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Pin to the same baseline as ci.yml — the previous
          # `git clone --depth 1` left vcpkg unable to resolve ports
          # against the baseline commit pinned in vcpkg.json.
          vcpkgGitCommitId: 56bb2411609227288b70117ead2c47585ba07713
          runVcpkgInstall: false

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: eval-nightly-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            eval-nightly-vcpkg-

      - name: Configure
        run: |
          cmake --preset ci-linux-clang \
            -DSOUXMAR_BUILD_EXAMPLES=ON \
            -DSOUXMAR_BUILD_CLI=ON

      - name: Build core + plugins + souxmar-eval + souxmar CLI
        # Sprint 13 push 2 — add the CLI binary so the
        # `gen-agent-tools.py --check-only` step downstream has a
        # `souxmar` to invoke.
        run: |
          cmake --build --preset ci-linux-clang --target souxmar_eval
          cmake --build --preset ci-linux-clang --target souxmar

      - name: Run the agent eval suite
        # Sprint 9 push 10 — `--latency-output` emits a JSON aggregate
        # alongside the pass/fail text report. The dashboard /
        # release-notes link to that JSON; reviewers compare p95
        # across runs to spot dispatcher slowdowns even when every
        # task still passes. `--max-p95-ms` would gate against an
        # absolute number; we leave it unset on this workflow until a
        # baseline soaks for a few nightly runs and the team picks a
        # defensible threshold (the ENGINEERING_PRACTICES.md 800 ms
        # number is the future-LLM-driven gate; the scripted-eval p95
        # today is microseconds).
        run: |
          # Build a --plugin-path list from every plugin directory under
          # the example tree. The eval runner needs the plugins on its
          # search path or the catalogue tasks that dispatch capabilities
          # will fail at find_mesher / find_solver / find_postproc.
          PLUGIN_ARGS=()
          for d in build/ci-linux-clang/examples/plugins/*/; do
            PLUGIN_ARGS+=(--plugin-path "$d")
          done
          # Sprint 11 push 3 — --min-pass-rate gate. SPRINT_PLAN.md
          # § Sprint 11 exit criterion #3 is "Agent eval suite passes
          # 90 %." We pin to 0.90 here; ratcheting up as the catalogue
          # stabilises is a future-sprint concern.
          build/ci-linux-clang/tools/eval/souxmar-eval evals/v1 "${PLUGIN_ARGS[@]}" \
            --latency-output eval-latency.json \
            --min-pass-rate  0.90 \
            | tee eval-report.txt

      - name: Upload eval report + latency JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval-report.txt
            eval-latency.json

      # Sprint 13 push 1 — ADR-0017 synthetic-load harness.
      # Runs every example pipeline + the deterministic-output
      # subset of the eval catalogue, diffs against the golden
      # corpus in scripts/synth-load/golden/. On the first run the
      # corpus is empty (placeholder hashes) — the harness exits
      # non-zero and the rotation initialises the corpus by running
      # --refresh-golden locally + reviewing the diff. After that,
      # drift here is treated as a P1 triage item per the
      # COMMUNITY.md SLA.
      - name: Synthetic-load harness (ADR-0017)
        if: always()
        # `continue-on-error` while the starter corpus is empty.
        # Sprint 14 push 1 flips this to a hard gate once the
        # first --refresh-golden lands.
        continue-on-error: true
        run: |
          scripts/synth-load/run.sh \
            --engine    build/ci-linux-clang/tools/souxmar/souxmar \
            --eval      build/ci-linux-clang/tools/eval/souxmar-eval \
            --json-out  synth-load-report.json \
            --verbose

      - name: Upload synth-load report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synth-load-report
          path: synth-load-report.json

      # Sprint 13 push 2 — verify the auto-generated agent-tool docs
      # page on docs.souxmar.dev is in sync with what the binary
      # actually exposes. The page is committed in-tree
      # (`docs-site/agents/tools.md`); if the registry changes
      # without the page being regenerated, this step fails the PR.
      - name: Verify generated agent tool docs are in sync
        run: |
          # The C++ build target above produces `souxmar` at this
          # path on the ci-linux-clang preset.
          scripts/docs-site/gen-agent-tools.py \
            --engine     build/ci-linux-clang/tools/souxmar/souxmar \
            --out        docs-site/agents/tools.md \
            --check-only
