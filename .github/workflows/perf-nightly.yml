name: Perf

# Runs the Google Benchmark suite on every PR that touches perf-relevant
# paths AND nightly across the full source tree. Captures JSON output
# from every benchmark binary into `perf-report/`, compares against
# committed baselines in `benchmarks/baselines/`, uploads the report
# as an artifact, and fails on regressions > 5% (Sprint 9 push 6 —
# matches docs/ENGINEERING_PRACTICES.md § Performance budgets; was 10%
# under the Sprint 5 nightly-only regime).
#
# Baseline files live one-per-benchmark-binary under
# `benchmarks/baselines/<binary_name>.json`. Files absent from the
# baseline directory are reported as "(new — no baseline yet)" and do
# not fail the gate; deliberate baseline rotations land via the
# update-workflow documented in benchmarks/baselines/README.md.

on:
  schedule:
    - cron: "47 5 * * *"     # 05:47 UTC daily (30 min after the sanitisers job)
  workflow_dispatch:
  pull_request:
    # Sprint 9 push 6 — widened from the Sprint 5 perf-relevant whitelist
    # (which only covered c_abi_mesh.cpp / c_abi_buffer.cpp / the
    # frozen-buffer headers / tools/perf-compare). The gate now fires on
    # any host-side core / pipeline / plugin-host change, the benchmark
    # suite itself, and the perf-compare tool. Anything outside this
    # path filter never affects performance by construction (UI work,
    # docs, AI tools, examples) and stays out of the per-PR gate.
    paths:
      - 'benchmarks/**'
      - 'src/core/**'
      - 'src/pipeline/**'
      - 'src/plugin-host/**'
      - 'include/souxmar/**'
      - 'include/souxmar-c/**'
      - 'tools/perf-compare/**'
      - '.github/workflows/perf-nightly.yml'

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  CMAKE_GENERATOR: Ninja
  # Regression threshold — fail if any benchmark slows down by more than
  # this fraction. Sprint 9 push 6 tightened 0.10 → 0.05 to match
  # ENGINEERING_PRACTICES.md. Operators tune via PR (with an RFC if the
  # change isn't a hardware-noise-floor follow-up).
  REGRESSION_THRESHOLD: "0.05"

jobs:
  bench:
    name: bench / ubuntu-22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config curl zip unzip tar \
                                  build-essential python3
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 17
          sudo apt-get install -y clang-17

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ec6fe06e8da05a8157dc8581fa96b36b571c1bd5
          runVcpkgInstall: false

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-perf-${{ hashFiles('vcpkg.json') }}

      - name: Configure (release + benchmarks)
        env:
          CC: clang-17
          CXX: clang++-17
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        # We use the base preset's vcpkg toolchain by inlining the
        # cache var. Benchmarks need the `tests` feature for Google
        # Benchmark itself (per vcpkg.json's `tests` feature group).
        run: |
          cmake -B build/perf \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DSOUXMAR_BUILD_BENCHMARKS=ON \
            -DSOUXMAR_BUILD_TESTS=OFF \
            -DSOUXMAR_BUILD_CLI=OFF \
            -DSOUXMAR_BUILD_EXAMPLES=OFF \
            -DVCPKG_MANIFEST_FEATURES=tests

      - name: Build benchmarks
        run: cmake --build build/perf --parallel

      - name: Run benchmarks (JSON output, full suite)
        # Sprint 9 push 6 — every benchmark binary contributes one
        # report file to perf-report/. The binary name is the file's
        # stem so the directory-compare step lines up baseline ↔
        # current by name.
        run: |
          mkdir -p perf-report
          for bench in bench_mesh_construction bench_mmap_buffer bench_face_tag bench_plugin_dispatch bench_heap_accountant; do
            echo "::group::run $bench"
            ./build/perf/benchmarks/$bench \
              --benchmark_format=json \
              --benchmark_out=perf-report/$bench.json \
              --benchmark_out_format=json \
              --benchmark_repetitions=3 \
              --benchmark_min_time=0.2s
            echo "::endgroup::"
          done

      - name: Compare full suite against baseline directory
        id: compare
        continue-on-error: true
        # Sprint 9 push 6 — directory mode. compare.py iterates every
        # perf-report/*.json, looks up the same-named file under
        # benchmarks/baselines/, and reports per-binary diffs. New
        # benchmarks (current-only) print "(new — no baseline)" and
        # don't fail the gate.
        run: |
          python3 tools/perf-compare/compare.py \
            --baseline-dir benchmarks/baselines \
            --current-dir  perf-report \
            --threshold    ${REGRESSION_THRESHOLD}

      - name: Render benchmark dashboard
        # Sprint 9 push 8 — DX-team SPRINT_PLAN.md story "Benchmark
        # dashboard published per release". Always runs (regardless of
        # whether the comparison step passed); a regressed run still
        # produces an HTML report with the red badge so reviewers can
        # see what broke without trawling the JSON artifact.
        if: always()
        run: |
          python3 tools/perf-compare/dashboard.py \
            --input-dir    perf-report \
            --baseline-dir benchmarks/baselines \
            --threshold    ${REGRESSION_THRESHOLD} \
            --output       perf-report/dashboard.html \
            --git-ref      "${{ github.sha }}" \
            --title        "souxmar benchmark report — ${{ github.ref_name }}"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ github.run_id }}
          # The artifact bundle now carries both the JSON reports and
          # the rendered dashboard.html — the latter is what release
          # notes link to per "published per release" from SPRINT_PLAN.md.
          path: perf-report/
          retention-days: 30

      - name: Fail if regressions detected
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error::Performance regression detected — see compare step output above."
          exit 1
