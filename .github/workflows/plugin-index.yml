# Sprint 10 push 3 — plugin-index publication workflow.
#
# Runs on every PR that touches `docs/plugin-index.toml` (or the
# validator's code path). Builds the souxmar CLI in release mode,
# then runs `souxmar plugin validate-index` against the file. Exit
# semantics:
#
#   exit 0       every check passed; PR is mergeable from the
#                index-validation perspective. Warnings (empty
#                license, missing version range, failed conformance)
#                may still be present; reviewers handle those.
#   exit 10      at least one error-severity issue (duplicate id,
#                malformed URL, invalid capability id). PR cannot
#                merge until the author fixes the entry.
#   exit ≠ 0,10  internal failure (build broke, file missing). The
#                workflow's "checks" status surfaces this distinctly
#                from validation failures.
#
# Authoring procedure documented in
# `.claude/skills/publishing-plugin-marketplace/SKILL.md`. DX reviews
# PRs for completeness; this workflow handles the schema gate.

name: plugin-index

on:
  pull_request:
    paths:
      - 'docs/plugin-index.toml'
      - 'include/souxmar/plugin/index.h'
      - 'src/plugin-host/index.cpp'
      - 'src/cli/main.cpp'
      - '.github/workflows/plugin-index.yml'
  workflow_dispatch:

concurrency:
  group: plugin-index-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  CMAKE_GENERATOR: Ninja

jobs:
  validate:
    name: validate plugin-index.toml
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17 lld-17

      - name: Set up vcpkg
        run: |
          if [ -z "$VCPKG_ROOT" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh"
            echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          fi

      - name: Cache vcpkg binary archives
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: plugin-index-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            plugin-index-vcpkg-

      - name: Configure (release + CLI only)
        env:
          CC: clang-17
          CXX: clang++-17
        # We only need the CLI to run `souxmar plugin validate-index`.
        # Skip benchmarks, examples, and tests — the validator itself
        # is exercised by unit tests in the main CI job.
        run: |
          cmake -B build/index \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DSOUXMAR_BUILD_BENCHMARKS=OFF \
            -DSOUXMAR_BUILD_TESTS=OFF \
            -DSOUXMAR_BUILD_CLI=ON \
            -DSOUXMAR_BUILD_EXAMPLES=OFF

      - name: Build souxmar CLI
        run: cmake --build build/index --target souxmar --parallel

      - name: Validate docs/plugin-index.toml
        # Capture both streams so the workflow log carries everything.
        # The exit code is what the gate keys on; warnings print but
        # don't fail. The summary line at the bottom of the validator's
        # output makes "errors=N warnings=M" trivially greppable from a
        # GitHub status comment / Slack notification.
        run: |
          ./build/index/src/cli/souxmar plugin validate-index \
            --index docs/plugin-index.toml

      - name: Surface conformance status in the job summary
        # Renders the validator's text output into the workflow's
        # summary page so reviewers don't need to dig through the full
        # log. This is the "conformance status surfaced" piece of the
        # SPRINT_PLAN.md story.
        if: always()
        run: |
          echo "### Plugin index validation summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./build/index/src/cli/souxmar plugin validate-index \
            --index docs/plugin-index.toml \
            2>&1 | tail -60 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
