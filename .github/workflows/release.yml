# Sprint 7 push 6 — release workflow.
# Sprint 10 push 8 — release-signing extension. Adds:
#   * macOS notarisation (notarytool + staple) via
#     scripts/release/notarize-macos.sh.
#   * Windows EV signing via scripts/release/sign-windows.ps1.
#   * Linux GPG detached signing via
#     scripts/release/build-release.sh --target linux.
#   * Signed channel manifest emission via
#     scripts/release/sign-manifest.sh, run in the publish job after
#     every per-platform artefact has uploaded.
#   * A pre-publish gate that refuses to publish when
#     build_uses_dev_key() would be true (i.e. when the CI build
#     forgot to override SOUXMAR_RELEASE_PUBKEY_HEX).
#
# Triggered by tags matching `v*` (typically `v0.9.0-beta1` for this
# release, `v1.0.0` for the eventual stable). Builds:
#
#   * source tarball — git-archive of the tagged tree (reproducible).
#   * Linux x86_64 CLI tarball — souxmar / souxmar-conformance /
#     souxmar-eval binaries, plus the in-tree example plugins,
#     GPG-detached-signed.
#   * macOS bundle — built + notarised + stapled (Sprint 10 push 8).
#   * Windows MSI — built + EV-signed (Sprint 10 push 8).
#   * Signed manifest.toml + manifest.toml.sig — the auto-updater
#     fetches these (Sprint 10 push 8).
#   * Python sdist — `pip install pysouxmar==<version>` source dist.
#
# Each artefact is attached to a GitHub release (draft, so a release
# maintainer can review before publishing). SHA-256 sums are computed
# and attached as a separate `SHA256SUMS` file.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # required to create / attach to a GitHub release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  CMAKE_GENERATOR: Ninja

jobs:
  # ---- 1. Source tarball -----------------------------------------
  source-tarball:
    name: source tarball
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version from tag
        id: compute
        run: |
          # Strip the leading `v` from the git tag.
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building artefacts for version: $VERSION"

      - name: git archive
        run: |
          mkdir -p artefacts
          git archive --format=tar.gz --prefix=souxmar-${{ steps.compute.outputs.version }}/ \
            -o artefacts/souxmar-${{ steps.compute.outputs.version }}-source.tar.gz \
            HEAD

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: artefacts/

  # ---- 2. Linux x86_64 CLI binary tarball -----------------------
  linux-cli:
    name: linux-x86_64 CLI tarball
    runs-on: ubuntu-22.04
    needs: source-tarball
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update
          # autoconf/autoconf-archive/automake/libtool: required by
          # vcpkg's libsodium port (builds from source via autotools).
          sudo apt-get install -y ninja-build clang-17 lld-17 \
                                  autoconf autoconf-archive automake libtool

      - name: Set up vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Cache vcpkg binary archives
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: release-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            release-vcpkg-

      - name: Configure (Release, with examples + CLI tools)
        env:
          SOUXMAR_RELEASE_PUBKEY_ID:  ${{ secrets.SOUXMAR_RELEASE_PUBKEY_ID }}
          SOUXMAR_RELEASE_PUBKEY_HEX: ${{ secrets.SOUXMAR_RELEASE_PUBKEY_HEX }}
        run: |
          if [[ -z "${SOUXMAR_RELEASE_PUBKEY_ID}" || -z "${SOUXMAR_RELEASE_PUBKEY_HEX}" ]]; then
            echo "::error::SOUXMAR_RELEASE_PUBKEY_ID / SOUXMAR_RELEASE_PUBKEY_HEX must be set"
            echo "::error::These come from the offline HSM via the release-engineer-only secret."
            exit 64
          fi
          cmake --preset ci-linux-clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DSOUXMAR_BUILD_EXAMPLES=ON \
            -DSOUXMAR_BUILD_CLI=ON \
            -DSOUXMAR_BUILD_TESTS=OFF \
            -DSOUXMAR_RELEASE_PUBKEY_ID="${SOUXMAR_RELEASE_PUBKEY_ID}" \
            -DSOUXMAR_RELEASE_PUBKEY_HEX="${SOUXMAR_RELEASE_PUBKEY_HEX}"

      - name: Build
        run: cmake --build --preset ci-linux-clang

      - name: Refuse-to-publish gate (dev-key check)
        run: |
          # Sprint 10 push 8 — refuse to upload artefacts built
          # against the in-tree dev signing key. The check runs the
          # built binary's `souxmar version --json` (Sprint 11+ adds
          # the JSON output; today we grep `update check --help`'s
          # note about dev-key).
          if build/ci-linux-clang/src/cli/souxmar update check 2>&1 \
              | grep -qi "souxmar-dev-key"; then
            echo "::error::This build still carries the souxmar-dev-key."
            echo "::error::Refusing to publish. Set the release pubkey via secrets."
            exit 65
          fi

      - name: Stage tarball
        run: |
          VERSION="${{ needs.source-tarball.outputs.version }}"
          STAGE="souxmar-${VERSION}-linux-x86_64"
          mkdir -p "${STAGE}/bin" "${STAGE}/plugins"

          cp build/ci-linux-clang/src/cli/souxmar               "${STAGE}/bin/"
          cp build/ci-linux-clang/tools/conformance/souxmar-conformance "${STAGE}/bin/"
          cp build/ci-linux-clang/tools/eval/souxmar-eval       "${STAGE}/bin/"

          # In-tree reference plugins: ship as a sibling `plugins/` dir
          # so SOUXMAR_PLUGIN_PATH=<install>/plugins is a one-liner for
          # the user. Each plugin gets its own subdir (manifest + .so).
          for d in build/ci-linux-clang/examples/plugins/*/; do
            name=$(basename "$d")
            mkdir -p "${STAGE}/plugins/${name}"
            cp "$d"*.so "${STAGE}/plugins/${name}/" 2>/dev/null || true
            cp "$d"souxmar-plugin.toml "${STAGE}/plugins/${name}/" 2>/dev/null || true
          done

          cp README.md LICENSE CHANGELOG.md "${STAGE}/"

          mkdir -p artefacts
          tar czf "artefacts/${STAGE}.tar.gz" "${STAGE}"

      - name: GPG detached-sign the tarball
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID:      ${{ secrets.GPG_KEY_ID }}
        run: |
          # Import the air-gapped key into a temp keyring on the
          # runner. After this job exits the runner is destroyed; the
          # private key never persists past one CI run.
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          for f in artefacts/*.tar.gz; do
            scripts/release/build-release.sh \
              --version "${{ needs.source-tarball.outputs.version }}" \
              --target  linux \
              --artifact "${f}"
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-cli
          path: artefacts/

  # ---- 2b. macOS bundle (Sprint 10 push 8) -----------------------
  #
  # Builds + notarises a macOS .dmg. The Apple notarisation step uses
  # scripts/release/notarize-macos.sh which polls notarytool with
  # bounded retry. Requires AC_USERNAME / AC_PASSWORD / AC_TEAM_ID
  # secrets — the per-developer-team values, not the global Apple
  # ID password.
  macos-bundle:
    name: macos-aarch64 bundle
    runs-on: macos-14
    needs: source-tarball
    if: ${{ vars.SOUXMAR_ENABLE_MACOS_RELEASE == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        # autoconf-archive + libtool needed by vcpkg's libsodium port.
        run: brew install ninja autoconf autoconf-archive automake libtool

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 56bb2411609227288b70117ead2c47585ba07713

      - name: Configure (Release)
        env:
          SOUXMAR_RELEASE_PUBKEY_ID:  ${{ secrets.SOUXMAR_RELEASE_PUBKEY_ID }}
          SOUXMAR_RELEASE_PUBKEY_HEX: ${{ secrets.SOUXMAR_RELEASE_PUBKEY_HEX }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSOUXMAR_BUILD_TESTS=OFF \
            -DSOUXMAR_RELEASE_PUBKEY_ID="${SOUXMAR_RELEASE_PUBKEY_ID}" \
            -DSOUXMAR_RELEASE_PUBKEY_HEX="${SOUXMAR_RELEASE_PUBKEY_HEX}"

      - name: Build
        run: cmake --build build

      - name: Bundle as .dmg
        run: |
          VERSION="${{ needs.source-tarball.outputs.version }}"
          mkdir -p "souxmar-${VERSION}/bin"
          cp build/src/cli/souxmar "souxmar-${VERSION}/bin/"
          mkdir -p artefacts
          hdiutil create -volname "souxmar-${VERSION}" \
            -srcfolder "souxmar-${VERSION}" \
            -ov -format UDZO \
            "artefacts/souxmar-${VERSION}-macos-aarch64.dmg"

      - name: Notarise + staple
        env:
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_TEAM_ID:  ${{ secrets.AC_TEAM_ID }}
        run: |
          for f in artefacts/*.dmg; do
            scripts/release/build-release.sh \
              --version "${{ needs.source-tarball.outputs.version }}" \
              --target  macos \
              --artifact "${f}"
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: artefacts/

  # ---- 2c. Windows MSI (Sprint 10 push 8) ------------------------
  windows-msi:
    name: windows-x86_64 MSI
    runs-on: windows-2022
    needs: source-tarball
    if: ${{ vars.SOUXMAR_ENABLE_WINDOWS_RELEASE == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 56bb2411609227288b70117ead2c47585ba07713

      - name: Configure (Release)
        env:
          SOUXMAR_RELEASE_PUBKEY_ID:  ${{ secrets.SOUXMAR_RELEASE_PUBKEY_ID }}
          SOUXMAR_RELEASE_PUBKEY_HEX: ${{ secrets.SOUXMAR_RELEASE_PUBKEY_HEX }}
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DSOUXMAR_BUILD_TESTS=OFF `
            "-DSOUXMAR_RELEASE_PUBKEY_ID=$env:SOUXMAR_RELEASE_PUBKEY_ID" `
            "-DSOUXMAR_RELEASE_PUBKEY_HEX=$env:SOUXMAR_RELEASE_PUBKEY_HEX"

      - name: Build
        run: cmake --build build --config Release

      - name: Sign EXE with EV cert
        env:
          SOUXMAR_EV_THUMBPRINT: ${{ secrets.SOUXMAR_EV_THUMBPRINT }}
        shell: pwsh
        run: |
          pwsh scripts/release/sign-windows.ps1 build/src/cli/Release/souxmar.exe

      - name: Stage + upload
        shell: pwsh
        run: |
          $version = "${{ needs.source-tarball.outputs.version }}"
          New-Item -ItemType Directory -Force -Path artefacts | Out-Null
          # Real release would build a .msi via WiX or candle; for now
          # we ship a zipped binary.
          Compress-Archive -Path build/src/cli/Release/souxmar.exe `
            -DestinationPath "artefacts/souxmar-$version-windows-x86_64.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: artefacts/

  # ---- 3. Python sdist -------------------------------------------
  python-sdist:
    name: pysouxmar sdist
    runs-on: ubuntu-22.04
    needs: source-tarball
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist
        run: |
          cd bindings/python
          python -m pip install --upgrade build
          python -m build --sdist
          mkdir -p ../../artefacts
          cp dist/*.tar.gz ../../artefacts/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: artefacts/

  # ---- 4. Compose the release ------------------------------------
  publish:
    name: publish GitHub release
    runs-on: ubuntu-22.04
    needs: [source-tarball, linux-cli, python-sdist, macos-bundle, windows-msi]
    # macos-bundle / windows-msi are gated on org-level vars
    # SOUXMAR_ENABLE_MACOS_RELEASE / SOUXMAR_ENABLE_WINDOWS_RELEASE
    # being "true". When unset, those jobs are skipped — the
    # publish job still depends on them but `if: always() &&
    # (success || skipped)` lets the workflow proceed.
    if: ${{ always() && needs.source-tarball.result == 'success' && needs.linux-cli.result == 'success' && needs.python-sdist.result == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyNaCl for manifest signing
        run: pip install pynacl

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Compute SHA256 sums + sizes
        id: hashes
        run: |
          cd artefacts
          find . -type f \( -name '*.tar.gz' -o -name '*.dmg' -o -name '*.zip' \) \
            -exec sha256sum {} \; | tee SHA256SUMS
          # Emit per-artefact (sha256, size, basename) triples for
          # the manifest emitter.
          : > /tmp/release-artefacts.txt
          find . -type f \( -name '*.tar.gz' -o -name '*.dmg' -o -name '*.zip' \) \
            -not -name 'souxmar-*-source.tar.gz' | while read -r f; do
            sha=$(sha256sum "$f" | awk '{print $1}')
            sz=$(stat -c %s "$f" 2>/dev/null || stat -f %z "$f")
            echo "${f}|${sha}|${sz}" >> /tmp/release-artefacts.txt
          done

      - name: Emit signed channel manifest
        env:
          SOUXMAR_SIGNING_KEY: ${{ secrets.SOUXMAR_SIGNING_KEY }}
        run: |
          VERSION="${{ needs.source-tarball.outputs.version }}"
          # Pick the channel by tag suffix: -beta / -rc / -alpha go
          # to beta; otherwise stable. nightly is built by a
          # separate scheduled workflow.
          case "${GITHUB_REF_NAME}" in
            *-alpha*|*-beta*|*-rc*) CHANNEL=beta ;;
            *)                       CHANNEL=stable ;;
          esac

          # Expiry is 90 days from issue — matches ADR-0013's
          # freshness recommendation.
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          EXPIRES="$(date -u -d '+90 days' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                  || gdate -u -d '+90 days' +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p artefacts
          cat > artefacts/manifest.toml <<EOF
          schema       = 1
          generated_at = "${NOW}"

          [channel]
          name       = "${CHANNEL}"
          expires_at = "${EXPIRES}"

          [release]
          version              = "${VERSION}"
          released_at          = "${NOW}"
          min_previous_version = ""
          rollback_target      = ""
          notes_url            = "https://github.com/souxmar/souxmar/releases/tag/${GITHUB_REF_NAME}"
          mandatory            = false
          EOF

          # One [[artifact]] per file. (linux|macos|windows) +
          # (x86_64|aarch64) inferred from the filename suffix.
          while IFS='|' read -r path sha size; do
            base="$(basename "$path")"
            case "$base" in
              *linux-x86_64*)   os=linux; arch=x86_64 ;;
              *linux-aarch64*)  os=linux; arch=aarch64 ;;
              *macos-aarch64*)  os=macos; arch=aarch64 ;;
              *macos-x86_64*)   os=macos; arch=x86_64 ;;
              *windows-x86_64*) os=windows; arch=x86_64 ;;
              *) continue ;;
            esac
            url="https://github.com/souxmar/souxmar/releases/download/${GITHUB_REF_NAME}/${base}"
            cat >> artefacts/manifest.toml <<EOF

          [[artifact]]
          os     = "${os}"
          arch   = "${arch}"
          url    = "${url}"
          sha256 = "${sha}"
          size   = ${size}
          EOF
          done < /tmp/release-artefacts.txt

          cat >> artefacts/manifest.toml <<EOF

          [signing]
          algorithm     = "ed25519"
          public_key_id = "${{ secrets.SOUXMAR_RELEASE_PUBKEY_ID }}"
          EOF

          echo "--- manifest.toml ---"
          cat artefacts/manifest.toml

          # Sign it.
          scripts/release/build-release.sh \
            --version "${VERSION}" \
            --target  manifest \
            --artifact artefacts/manifest.toml

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          # Draft so a release maintainer pastes in the
          # docs/RELEASE_NOTES_TEMPLATE.md body before publishing.
          draft: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          name: souxmar ${{ needs.source-tarball.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: docs/RELEASE_NOTES_TEMPLATE.md
          files: |
            artefacts/**/*.tar.gz
            artefacts/**/*.tar.gz.asc
            artefacts/**/*.dmg
            artefacts/**/*.zip
            artefacts/manifest.toml
            artefacts/manifest.toml.sig
            artefacts/SHA256SUMS
