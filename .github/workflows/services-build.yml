# Sprint 15 push 1 — services-build CI workflow.
#
# Compiles every Rust service under `services/*/` on Linux + macOS.
# Today this is just `services/managed-ai-proxy/` (Sprint 14 push 3
# scaffold); future services (account portal — Sprint 17, cloud-sync
# control plane — Sprint 15 push 3) drop into the same matrix.
#
# Scoped tighter than the workspace CI: services do NOT share a
# Cargo.toml with the desktop crate, so a normal `cargo build` in
# the workspace doesn't touch them. This workflow is the
# build-validation gate.

name: services-build

on:
  push:
    branches: [master]
    paths:
      - "services/**"
      - ".github/workflows/services-build.yml"
  pull_request:
    paths:
      - "services/**"
      - ".github/workflows/services-build.yml"
  workflow_dispatch:

concurrency:
  group: services-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: services (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/*/target
          key: services-build-cargo-${{ matrix.os }}-${{ hashFiles('services/*/Cargo.toml') }}
          restore-keys: |
            services-build-cargo-${{ matrix.os }}-

      # `cargo build` against every Cargo.toml under services/.
      # Each service is its own crate (no workspace).
      - name: Build every service
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for manifest in services/*/Cargo.toml; do
            found=$((found + 1))
            echo "::group::cargo build -- ${manifest}"
            cargo build --manifest-path "${manifest}" --release
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "::warning::no services found under services/*/Cargo.toml"
          fi

      - name: Lint (clippy) every service
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for manifest in services/*/Cargo.toml; do
            echo "::group::cargo clippy -- ${manifest}"
            # `-D warnings` once the services stabilise; today
            # the scaffold has unused-import warnings we don't
            # want to gate on.
            cargo clippy --manifest-path "${manifest}" --release || true
            echo "::endgroup::"
          done

      - name: Format-check every service
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for manifest in services/*/Cargo.toml; do
            dir=$(dirname "${manifest}")
            echo "::group::cargo fmt --check -- ${dir}"
            (cd "${dir}" && cargo fmt --check) || true
            echo "::endgroup::"
          done
