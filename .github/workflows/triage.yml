# Sprint 12 push 1 — triage workflow.
#
# Auto-labels new issues based on the template's frontmatter labels
# + posts a single comment naming the SLA window the issue lands in
# (per docs/COMMUNITY.md § "Response SLAs"). Maintainers re-priortise
# via labels; the bot doesn't re-comment when labels change.

name: triage

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  issues: write
  contents: read

jobs:
  acknowledge:
    if: ${{ github.event.action == 'opened' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Post SLA acknowledgement
        uses: actions/github-script@v9
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(l => l.name);
            let sla = "5 business days";  // default for feature / question
            let role = "the triage rotation";
            if (labels.includes("type:bug")) {
              sla = "48 hours";
              role = "the bug-triage maintainer";
            }
            if (labels.includes("type:rfc")) {
              sla = "7 days";
              role = "an RFC sponsor";
            }
            if (context.payload.issue.title.toLowerCase().includes("crash") ||
                context.payload.issue.title.toLowerCase().includes("data loss")) {
              sla = "24 hours (auto-bumped — title suggests P0)";
            }
            const body = [
              "Thanks for filing!",
              "",
              "A response from " + role + " is committed within **" + sla + "** ",
              "per [`docs/COMMUNITY.md`](../blob/master/docs/COMMUNITY.md) § \"Response SLAs.\" ",
              "Maintainers will adjust labels + priority as part of that response; ",
              "if you disagree with the priority, comment with reasoning.",
              "",
              "**Reminders:**",
              "- Security issues go to `security@souxmar.dev`, not a public issue.",
              "- The public alpha (v0.9.x) is still being filled in. Some panels ",
              "  in the desktop app legitimately say \"Sprint 12+\" — see ",
              "  [`docs/COMMUNITY.md`](../blob/master/docs/COMMUNITY.md) § \"Public alpha.\""
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  auto-label-area:
    if: ${{ github.event.action == 'opened' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Apply area label
        uses: actions/github-script@v9
        with:
          script: |
            const body  = (context.payload.issue.body  || "").toLowerCase();
            const title = (context.payload.issue.title || "").toLowerCase();
            const add = new Set();

            // Surface inference from the bug/feature template's
            // free-text body. The dropdowns in the template are
            // the authoritative input; this is the back-stop for
            // issues that come in without dropdown answers (e.g.,
            // forwarded by maintainers from email).
            const map = [
              ["desktop", "area:desktop"],
              ["cli",     "area:cli"],
              ["pysouxmar", "area:python"],
              ["plugin",  "area:plugin"],
              ["agent",   "area:agent"],
              ["chat",    "area:agent"],
              ["abi",     "area:abi"],
              ["docs",    "area:docs"],
              ["build",   "area:build"],
            ];
            for (const [needle, label] of map) {
              if (body.includes(needle) || title.includes(needle)) {
                add.add(label);
              }
            }
            if (add.size === 0) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              labels: [...add]
            });
