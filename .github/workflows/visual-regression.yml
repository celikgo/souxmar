# Sprint 14 push 1 — visual-regression matrix workflow.
#
# Builds the desktop React frontend + runs Playwright snapshots on
# every supported OS, so font-rendering variance between Linux,
# macOS, and Windows is captured as separate per-platform
# baselines (per ADR-0017's "synthetic regression net is OS-aware"
# principle).
#
# The baselines live under
# `tests/visual/specs/<spec>.spec.ts-snapshots-{linux,darwin,win32}/`
# per the per-platform `snapshotPathTemplate` in
# `tests/visual/playwright.config.ts`.
#
# Until the first batch of baselines lands (per BASELINES.md), the
# workflow runs with `continue-on-error: true` on the test step —
# the maintainer downloads the artefact, reviews the renders, and
# commits the initial baselines into the per-platform directories.
# Sprint 15+ flips the flag once the corpus is seeded.

name: visual-regression

on:
  push:
    branches: [master]
    paths:
      - "src/desktop/**"
      - "tests/visual/**"
      - ".github/workflows/visual-regression.yml"
  pull_request:
    paths:
      - "src/desktop/**"
      - "tests/visual/**"
      - ".github/workflows/visual-regression.yml"
  workflow_dispatch:

concurrency:
  group: visual-regression-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: visual (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            src/desktop/package.json
            tests/visual/package.json

      - name: Install desktop deps
        working-directory: src/desktop
        run: npm ci || npm install

      - name: Install visual-test deps + Playwright browsers
        working-directory: tests/visual
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run visual-regression suite
        # Sprint 14 push 1 — `continue-on-error` while the per-
        # platform corpus is empty (per BASELINES.md). Sprint 15
        # push 1 flips this to a hard gate after the maintainer
        # commits the initial batch.
        continue-on-error: true
        working-directory: tests/visual
        run: npm run test

      - name: Upload Playwright report + actual screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-${{ matrix.os }}
          path: |
            tests/visual/playwright-report
            tests/visual/test-results
