# ---- in-tree opt-in adapters ------------------------------------------
#
# Five external-binary adapters live under examples/plugins/ but build
# only when their respective SOUXMAR_WITH_* CMake flag is on and the
# external dependency is reachable. They appear in the index so users
# searching for a CFD or CAD path can find them; the `paid` flag stays
# false (they're open-source) but installation is the user's
# responsibility.

[[plugin]]
id           = "dev.souxmar.examples.occt-reader"
name         = "OpenCASCADE CAD reader"
description  = "Reads STEP and IGES CAD files via OpenCASCADE. Opt-in: requires `-DSOUXMAR_WITH_OPENCASCADE=ON` and OCCT 7.x at build time."
capabilities = ["reader.step", "reader.iges"]
license      = "Apache-2.0"
source       = "https://github.com/souxmar/souxmar/tree/master/examples/plugins/occt-reader"
author       = "souxmar project"
souxmar_versions = ">=1.0,<2.0"
conformance      = "passed"
conformance_date = "2026-05-11"
status           = "active"

[[plugin]]
id           = "dev.souxmar.examples.gmsh-mesher"
name         = "Gmsh tetrahedral mesher"
description  = "Embeds Gmsh as a library. Production-grade tetrahedralisation; advancing-front + Delaunay strategies. Opt-in: `-DSOUXMAR_WITH_GMSH=ON`."
capabilities = ["mesher.tetra.gmsh"]
license      = "Apache-2.0"
source       = "https://github.com/souxmar/souxmar/tree/master/examples/plugins/gmsh-mesher"
author       = "souxmar project"
souxmar_versions = ">=1.0,<2.0"
conformance      = "passed"
conformance_date = "2026-05-11"
status           = "active"

[[plugin]]
id           = "dev.souxmar.examples.fenicsx-solver"
name         = "FEniCSx FEM solver (Poisson)"
description  = "Routes a souxmar Mesh + BCs through DOLFINx; consumes the DOLFINx solution back into a souxmar Field. v1 covers Poisson — broader element coverage tracks DOLFINx releases. Opt-in: `-DSOUXMAR_WITH_FENICSX=ON`."
capabilities = ["solver.fem.poisson"]
license      = "Apache-2.0"
source       = "https://github.com/souxmar/souxmar/tree/master/examples/plugins/fenicsx-solver"
author       = "souxmar project"
souxmar_versions = ">=1.0,<2.0"
conformance      = "passed"
conformance_date = "2026-05-11"
status           = "active"

[[plugin]]
id           = "dev.souxmar.examples.openfoam-solver"
name         = "OpenFOAM CFD adapter"
description  = "Invokes simpleFoam / pimpleFoam / interFoam via subprocess per ADR-0009 (no GPL linking). Mixed-element polyMesh translator (Tet4 / Hex8 / Prism6 / Pyramid5) + per-patch BC routing via the v1.3 per-face-tag ABI. Opt-in: `-DSOUXMAR_WITH_OPENFOAM=ON`."
capabilities = ["solver.cfd.openfoam.simple", "solver.cfd.openfoam.pimple", "solver.cfd.openfoam.inter"]
license      = "Apache-2.0"
source       = "https://github.com/souxmar/souxmar/tree/master/examples/plugins/openfoam-solver"
author       = "souxmar project"
souxmar_versions = ">=1.0,<2.0"
conformance      = "passed"
conformance_date = "2026-05-11"
status           = "active"

[[plugin]]
id           = "dev.souxmar.examples.blender-reader"
name         = "Blender .blend importer"
description  = "Reads Blender .blend files via the same subprocess harness OpenFOAM uses (bpy.ops.wm.obj_export → OBJ → souxmar mesh). Round-trips named collections to per-cell tags. Opt-in: `-DSOUXMAR_WITH_BLENDER=ON` and Blender 4.x on PATH."
capabilities = ["reader.blend"]
license      = "Apache-2.0"
source       = "https://github.com/souxmar/souxmar/tree/master/examples/plugins/blender-reader"
author       = "souxmar project"
souxmar_versions = ">=1.0,<2.0"
conformance      = "passed"
conformance_date = "2026-05-11"
status           = "active"
