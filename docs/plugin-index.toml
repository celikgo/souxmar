# souxmar plugin index — canonical static listing.
#
# Sprint 10 push 2 (Plugin-team SPRINT_PLAN.md story for Sprint 10).
# Each [[plugin]] table is one publicly-listed souxmar plugin: who
# wrote it, what capabilities it serves, where the source lives, the
# souxmar version range it supports, its conformance state, and its
# lifecycle marker. Schema in include/souxmar/plugin/index.h; parser
# in src/plugin-host/index.cpp; CLI surface is `souxmar plugin
# search`.
#
# Open-index policy is in docs/BUSINESS_MODEL.md § Plugin marketplace
# economics. Authoring procedure is in .claude/skills/
# publishing-plugin-marketplace/SKILL.md.
#
# This file is the single source of truth — the paid-marketplace
# entries (Sprint 16+) will join via the same schema with `paid =
# true` set on each. The DX team reviews PRs against this file for
# completeness; we do not vet code or behaviour. Conformance status
# is the only quality signal.
#
# To add an entry: copy any [[plugin]] block, edit the fields, open a
# PR. The publishing-plugin-marketplace skill walks through the full
# process including how to generate a conformance attestation.

# ---- in-tree reference plugins (always-on) ----------------------------
#
# Eleven plugins live under examples/plugins/ in the souxmar repo and
# are built unconditionally. They are listed here so `souxmar plugin
# search` surfaces them alongside third-party entries — there's no
# special-case in the index for "in-tree vs. out-of-tree".

[[plugin]]
id           = "dev.souxmar.examples.hello-mesher"
name         = "Hello mesher"
description  = "Canonical reference plugin: produces a unit tetrahedron, ignoring input geometry and options. Used by tests and tutorials."
capabilities = ["mesher.tetra.hello"]
license      = "Apache-2.0"
source       = "https://github.com/souxmar/souxmar/tree/master/examples/plugins/hello-mesher"
author       = "souxmar project"
souxmar_versions = ">=1.0,<2.0"
conformance      = "passed"
conformance_date = "2026-05-11"
status           = "active"

