# SPDX-License-Identifier: Apache-2.0
#
# Pipe-bend CFD — runnable CFD example. Drives the Sprint 8 capability
# chain (reader → CFD solver → writer) against in-tree plugins, with
# real geometry from a triangulated surface mesh (Sprint 9 push 5).
#
# What this models: steady laminar flow through a 90° L-shaped duct
# with a square cross-section, inlet at one end and outlet at the
# other. The geometry is a Tri3 surface mesh read from pipe-bend.obj
# (this directory) with usemtl-tagged inlet / walls / outlet groups
# that obj-reader preserves as per-cell tags (Sprint 9 push 5).
#
# Default CI: cfd-stub serves `solver.cfd.simple` (uniform velocity
# field on the surface mesh — no PDE solve; the stub is shape-agnostic).
# Nightly CFD-bearing matrix: a full reader → tetrahedraliser →
# openfoam-solver pipeline runs once the gmsh-mesher tag-preservation
# follow-on lands (the openfoam-solver translator requires linear 3D
# elements; a Tri3 surface mesh alone doesn't form a polyMesh volume).
# Until then, the openfoam path is documented in README.md.
#
# Run:
#   souxmar run examples/pipe-bend/pipeline.yaml \
#     --plugin-path build/dev/examples/plugins
#
# Output: pipe-bend.vtu in $PWD.

version: 1

stages:
  # Stage 1: read.
  # reader.obj parses the Tri3 surface mesh from pipe-bend.obj and
  # preserves the usemtl groups (`inlet`, `walls`, `outlet`) as
  # integer per-cell tags. Downstream stages see those tags via
  # souxmar_mesh_cell_tag (and, once a tetrahedraliser is in the
  # chain, the corresponding tet boundary faces inherit them via
  # souxmar_mesh_face_tag, ABI v1.3).
  - id: mesh
    plugin: reader.obj
    input:
      path: pipe-bend.obj

  # Stage 2: CFD solve.
  # solver.cfd.simple is served by:
  #   - cfd-stub (always-on) in default CI — closed-form uniform
  #     velocity field; runs in microseconds; shape-agnostic so the
  #     Tri3 surface mesh works directly.
  #   - openfoam-solver (opt-in) on the nightly CFD-bearing matrix —
  #     simpleFoam invoked via subprocess per ADR-0009; per-patch BC
  #     routing engages via the v1.3 per-face-tag ABI (Sprint 9 push 3).
  #     Requires a Tet4/Hex8/Prism6/Pyramid5 volume mesh — pipe-bend
  #     fully wires this once gmsh-mesher's tag-preservation lands as
  #     a separate Sprint 9 push.
  - id: solve
    plugin: solver.cfd.simple
    input:
      mesh: { from: mesh }
      velocity_magnitude: 1.5
      flow_direction: [1.0, 0.0, 0.0]
      kinematic_viscosity: 1.5e-5
      end_time: 10.0
      delta_t: 1.0
      write_interval: 10.0

  # Stage 3: write.
  # The VTU writer doesn't care which solver produced the velocity
  # field — same downstream as every other Sprint 5+ example.
  - id: write
    plugin: writer.vtu
    input:
      mesh:  { from: mesh }
      field: { from: solve }
      path:  pipe-bend.vtu
