[plugin]
id            = "dev.souxmar.examples.gmsh-mesher"
name          = "Gmsh Tetra Mesher"
version       = "0.1.0"
abi           = 1
license       = "Apache-2.0"
homepage      = "https://github.com/souxmar/souxmar/tree/main/examples/plugins/gmsh-mesher"

description   = "Gmsh-backed tetrahedral mesher driving the Gmsh C++ API."
documentation = "https://souxmar.dev/docs/plugins/gmsh-mesher"
tags          = ["mesher", "tetrahedral", "gmsh"]
min_souxmar_abi_minor = 0

[plugin.binary]
file          = "libgmsh_mesher.so"

[plugin.capabilities]
provides      = ["mesher.tetra.gmsh"]

[plugin.threading]
# Gmsh's API holds process-global state — calls must be serialised.
model         = "single-threaded"

[plugin.dependencies]
souxmar       = ">=0.0.1,<2.0"
