[plugin]
id            = "dev.souxmar.examples.hello-writer"
name          = "Hello Writer (souxmar reference plugin)"
version       = "0.1.0"
abi           = 1
license       = "Apache-2.0"
homepage      = "https://github.com/souxmar/souxmar/tree/main/examples/plugins/hello-writer"

[plugin.binary]
file          = "libhello_writer.so"

[plugin.capabilities]
provides      = ["writer.text-summary"]

[plugin.threading]
model         = "single-threaded"

[plugin.dependencies]
souxmar       = ">=0.0.1,<2.0"
