[plugin]
id            = "dev.souxmar.examples.obj-reader"
name          = "Wavefront OBJ Reader"
version       = "0.1.0"
abi           = 1
license       = "Apache-2.0"
homepage      = "https://github.com/souxmar/souxmar/tree/main/examples/plugins/obj-reader"

description   = "Parses Wavefront OBJ files into a Tri3 surface mesh; fan-triangulates polygons."
documentation = "https://souxmar.dev/docs/plugins/obj-reader"
tags          = ["reader", "obj", "wavefront", "tessellated", "reference"]
min_souxmar_abi_minor = 1   # reader.* capability surface lands at ABI minor 1.

[plugin.binary]
file          = "libobj_reader.so"

[plugin.capabilities]
provides      = ["reader.obj"]

[plugin.threading]
model         = "reentrant"

[plugin.dependencies]
souxmar       = ">=0.0.1,<2.0"
