[plugin]
id            = "dev.souxmar.examples.stl-reader"
name          = "ASCII STL Reader"
version       = "0.1.0"
abi           = 1
license       = "Apache-2.0"
homepage      = "https://github.com/souxmar/souxmar/tree/main/examples/plugins/stl-reader"

# Sprint 6 push 2 additive manifest fields.
description   = "Parses ASCII STL files into a Tri3 surface mesh with vertex deduplication."
documentation = "https://souxmar.dev/docs/plugins/stl-reader"
tags          = ["reader", "stl", "tessellated", "reference"]
min_souxmar_abi_minor = 1   # reader.* capability surface lands at ABI minor 1.

[plugin.binary]
file          = "libstl_reader.so"

[plugin.capabilities]
provides      = ["reader.stl"]

[plugin.threading]
model         = "reentrant"

[plugin.dependencies]
souxmar       = ">=0.0.1,<2.0"
