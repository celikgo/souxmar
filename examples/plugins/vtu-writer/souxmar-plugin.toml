[plugin]
id            = "dev.souxmar.examples.vtu-writer"
name          = "VTU Writer (in-tree, no VTK dep)"
version       = "0.1.0"
abi           = 1
license       = "Apache-2.0"
homepage      = "https://github.com/souxmar/souxmar/tree/main/examples/plugins/vtu-writer"

[plugin.binary]
file          = "libvtu_writer.so"

[plugin.capabilities]
provides      = ["writer.vtu"]

[plugin.threading]
model         = "single-threaded"

[plugin.dependencies]
souxmar       = ">=0.0.1,<2.0"
