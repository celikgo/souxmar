# scripts/synth-load/golden/corpus.toml
#
# Golden fingerprints for the synthetic-load harness (ADR-0017).
# Each [[golden]] stanza is one target; sha256 is the normaliser-
# output hash. Regenerated by run.sh --refresh-golden.
#
# Sprint 13 push 1 — starter corpus. The first real fingerprints
# are recorded by the first post-v0.9.0 CI run with --refresh-
# golden; until then the harness reports "no-golden" for each
# target (treated as divergence so CI fails loudly, signalling
# that the corpus needs to be initialised).
#
# Adding new entries:
#   1. Verify the target's output is the *intended* behaviour.
#   2. Run: scripts/synth-load/run.sh --refresh-golden
#   3. Review the diff; commit the corpus + the source change in
#      the same PR.
#
# Last regenerated: never (placeholder corpus)

# Cantilever-beam example.
# Sprint 13 push 1: hash recorded after first green CI run.
[[golden]]
kind   = "example"
id     = "cantilever-beam"
sha256 = ""

# Eval task: listing-01-list-plugins.
# Lists registered plugins; output is sensitive to the plugin
# discovery order, which the normaliser sorts.
[[golden]]
kind   = "eval"
id     = "listing-01-list-plugins"
sha256 = ""

# Eval task: mesh-01-hello-mesher.
# Drives the hello-mesher plugin end-to-end. The output is the
# stage-result trace; deterministic given a fixed plugin set.
[[golden]]
kind   = "eval"
id     = "mesh-01-hello-mesher"
sha256 = ""

# Eval task: export-01-vtu.
# Exercises the vtu-writer plugin. The eval output (not the .vtu
# file itself — that's covered by the example-level golden) is the
# tool-dispatch trace.
[[golden]]
kind   = "eval"
id     = "export-01-vtu"
sha256 = ""
