[package]
name        = "souxmar-bridge"
version     = "0.9.0-beta5"
description = "Rust ⇄ C++ FFI bridge between the souxmar desktop shell and libsouxmar-*"
edition     = "2021"
license     = "Apache-2.0"

# Sprint 12 push 2 skeleton. Closes R-013 (the workbench's three
# panels each wait on this crate). ADR-0016 ratifies the
# BridgeFeatureSet contract this crate exposes.
#
# Today's surface is small on purpose: the contract (which
# features are wired) is the load-bearing artefact, not the
# behaviour. Subsequent pushes (Sprint 13+) fill in real FFI
# calls into libsouxmar-pipeline, libsouxmar-core, libsouxmar-ai
# behind the same Bridge API.

[dependencies]
serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"

[lib]
name      = "souxmar_bridge"
crate-type = ["rlib"]   # consumed by src-tauri/; not a dylib today.
